# Fragility scoring weights — all six factors must sum to 1.0
# Each factor measures a different dimension of structural weakness.
weights:
  hubris_index: 0.18          # Incumbent overconfidence; ignoring or dismissing the disruption signal
  energy_defense_ratio: 0.22  # Cost asymmetry: how expensive is defense vs. how cheap is disruption
  kinetic_ripple: 0.16        # Physical/kinetic pressure creating cascade potential into adjacent nodes
  centralization_score: 0.20  # Single points of failure; how concentrated is the Empire node
  redundancy_penalty: 0.12    # Lack of fallback paths (higher penalty = fewer alternatives available)
  antifragility_attraction: 0.12  # Whether the Disruptor actively benefits from disorder and stress

# Score thresholds that gate pipeline decisions
thresholds:
  high_fragility: 0.72   # Nodes above this score are surfaced for opportunity generation
  weak_convexity: 0.56   # Ideas below this conviction threshold are flagged monitor_only
  crowded_trade: 0.65    # Signals above this tag-weight saturation are considered consensus/crowded

# Tag-based salience boosts — signals carrying these tags receive higher fragility contribution.
# Tags are derived from signal metadata and archetype trigger_tags in archetypes.yaml.
tag_weights:
  debt: 0.18
  refinancing: 0.15
  choke_point: 0.14
  chokepoint: 0.14
  cable: 0.12
  bypass: 0.1
  distributed-pressure: 0.18
  open-source: 0.16
  protocol: 0.12
  grid: 0.14
  sabotage: 0.12
  microgrid: 0.15
  stablecoin: 0.14
  payment-rail: 0.12
  margin-pressure: 0.14
  social-fragmentation: 0.12

