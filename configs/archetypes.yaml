version: 1
topologies:
  - id: empire_vs_swarm
    name: Empire vs Swarm
    empire_type: Centralized defensive order
    disruptor_type: Distributed adaptive swarm
    asymmetry_type: Broad expensive defense surface versus many cheap probes
    trigger_tags:
      - distributed-pressure
      - asymmetric-attack
      - proxy-network
      - drone
      - sabotage
      - swarm
    cheap_weapon_examples:
      - cheap autonomous strike package
      - small proxy action against a high-value node
      - open collaborative coordination network
    analog_refs:
      - rome_vs_tribal_swarms
      - battleship_vs_drone

  - id: chokepoint_vs_bypass
    name: Chokepoint vs Bypass
    empire_type: Chokepoint owner
    disruptor_type: Bypass network builder
    asymmetry_type: Control of a narrow strategic route versus low-cost rerouting
    trigger_tags:
      - chokepoint
      - cable
      - bypass
      - routing
      - arctic
      - logistics
      - satellite
      - undersea
    cheap_weapon_examples:
      - alternate route financed below incumbent replacement cost
      - software-defined rerouting around a physical chokepoint
      - insurance pressure on the dominant route
    analog_refs:
      - blockbuster_vs_netflix
      - cable_bypass_network

  - id: monolith_vs_protocol
    name: Monolith vs Protocol
    empire_type: Proprietary integrated incumbent
    disruptor_type: Open protocol or open-weight network
    asymmetry_type: High fixed-cost moat versus modular low-friction adoption
    trigger_tags:
      - open-source
      - protocol
      - developer-flight
      - margin-pressure
      - commoditization
      - ai
      - model
      - developer-tools
    cheap_weapon_examples:
      - open release collapsing pricing power
      - community extensions outrunning closed roadmap cycles
      - protocol-level interoperability eroding bundle lock-in
    analog_refs:
      - linux_vs_proprietary_stacks
      - legacy_media_vs_creator_platforms

  - id: heavy_capital_vs_light_network
    name: Heavy Capital vs Light Network
    empire_type: Asset-heavy centralized platform
    disruptor_type: Asset-light network or software layer
    asymmetry_type: Debt-funded defense versus low-cost modular substitution
    trigger_tags:
      - debt
      - refinancing
      - balance-sheet-stress
      - payment-rail
      - stablecoin
      - asset-light
      - liquidity-flight
    cheap_weapon_examples:
      - software rail bypassing regulated clearing
      - rapid user migration away from capital-intensive incumbents
      - financing spread that compounds defense costs
    analog_refs:
      - centralized_finance_vs_defi
      - linux_vs_proprietary_stacks

  - id: regulated_core_vs_gray_edge
    name: Regulated Core vs Gray Edge
    empire_type: Regulated core institution
    disruptor_type: Gray-market or informal edge network
    asymmetry_type: Slow compliance-heavy response versus opportunistic edge adaptation
    trigger_tags:
      - sanctions
      - shadow-banking
      - gray-market
      - evasion
      - informal-network
      - capital-controls
    cheap_weapon_examples:
      - informal liquidity route around policy friction
      - sanctions-resistant settlement workaround
      - small actors exploiting regulatory blind spots
    analog_refs:
      - centralized_finance_vs_defi
      - rome_vs_tribal_swarms

  - id: central_grid_vs_micro_network
    name: Central Grid vs Micro-Network
    empire_type: Centralized utility grid
    disruptor_type: Distributed resilience stack
    asymmetry_type: Large brittle grid surface versus modular local self-healing systems
    trigger_tags:
      - grid
      - outage
      - microgrid
      - storage
      - resilience
      - substation
      - cyber-physical
    cheap_weapon_examples:
      - low-cost disruption of a central node
      - modular local generation reducing dependence on the main grid
      - resilience software shifting demand to distributed assets
    analog_refs:
      - battleship_vs_drone
      - legacy_media_vs_creator_platforms

  - id: trusted_brand_vs_open_commodity
    name: Trusted Brand vs Open Commodity
    empire_type: Premium trusted brand
    disruptor_type: Open commodity layer
    asymmetry_type: Brand premium defended across the whole stack versus rapid commoditization
    trigger_tags:
      - commoditization
      - open-weights
      - price-war
      - white-label
      - developer-defection
    cheap_weapon_examples:
      - open commodity removing pricing umbrella
      - white-label clones reducing differentiation
      - ecosystem compatibility dissolving brand stickiness
    analog_refs:
      - blockbuster_vs_netflix
      - linux_vs_proprietary_stacks

historical_analogs:
  - id: rome_vs_tribal_swarms
    name: Rome vs tribal swarms
    reference: "Imperial overextension meeting mobile low-cost challengers."
    why_relevant: "Useful when a dominant system must defend every frontier while small actors probe weak spots."

  - id: battleship_vs_drone
    name: Battleship vs drone
    reference: "High-value heavy platform exposed to cheap precision disruption."
    why_relevant: "Maps to expensive infrastructure being pressured by low-cost autonomous or distributed tools."

  - id: blockbuster_vs_netflix
    name: Blockbuster vs Netflix
    reference: "Physical distribution moat displaced by a distribution-bypass model."
    why_relevant: "Fits chokepoint and trusted-brand bypass patterns."

  - id: linux_vs_proprietary_stacks
    name: Linux vs proprietary stacks
    reference: "Open modular ecosystem eroding integrated proprietary control."
    why_relevant: "Fits monolith versus protocol and open commodity patterns."

  - id: legacy_media_vs_creator_platforms
    name: Legacy media vs creator platforms
    reference: "Centralized gatekeepers displaced by lower-friction edge participation."
    why_relevant: "Useful when attention, distribution, or trust moves toward fragmented networks."

  - id: centralized_finance_vs_defi
    name: Centralized finance vs DeFi
    reference: "Compliance-heavy intermediaries pressured by open programmable financial rails."
    why_relevant: "Fits regulated core, gray edge, and debt defense spirals."

  - id: cable_bypass_network
    name: Undersea cable bypass fork
    reference: "An alternate route weakens the value of a dominant corridor."
    why_relevant: "Useful when control of a physical route is undermined by a modular bypass."

fragility_patterns:
  - name: single point of failure
    description: "A narrow node can disable a much larger system."
    trigger_tags:
      - chokepoint
      - single-node
      - central-hub

  - name: brittle compliance moat
    description: "The incumbent depends on rules and approval cycles that edge actors can ignore."
    trigger_tags:
      - compliance
      - approval-lag
      - regulation

  - name: debt-funded defense
    description: "The system relies on financing capacity to preserve the status quo."
    trigger_tags:
      - debt
      - refinancing
      - spread-widening

  - name: narrative fragmentation
    description: "Social trust and coordination splinter faster than institutions can re-establish coherence."
    trigger_tags:
      - distrust
      - fragmentation
      - panic
      - sentiment-entropy

  - name: logistics dependence
    description: "Large systems rely on transport, routing, or inventory coordination that can be cheaply disrupted."
    trigger_tags:
      - logistics
      - routing
      - shipping
      - undersea

  - name: satellite / cable / port chokepoint
    description: "Critical connectivity relies on physical nodes that are capital-intensive to defend."
    trigger_tags:
      - satellite
      - cable
      - port
      - chokepoint
